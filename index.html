<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WasliNow Casablanca</title>
<style>
body{margin:0;font-family:Arial;background:#eaffea}
header{
background:green;color:white;padding:15px;text-align:center;
font-size:22px;font-weight:bold;
}
.container{padding:15px}
.card{
background:white;padding:15px;margin-top:15px;
border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1)
}
input{
width:100%;padding:10px;border:1px solid green;
border-radius:8px;margin-top:10px
}
button{
width:100%;padding:12px;margin-top:10px;
background:green;color:white;border:0;border-radius:8px
}
.driver{padding:8px;border-bottom:1px solid #ddd}
.badge{background:black;color:white;padding:3px 8px;border-radius:6px;font-size:12px}
</style>
</head>

<body>

<header>
🚀 WasliNow - الدار البيضاء
</header>

<div class="container">

<div class="card">
<h3>📦 طلب جديد</h3>
<input id="order" placeholder="شنو بغيت توصل؟">
<button onclick="addOrder()">إرسال الطلب</button>
</div>

<div class="card">
<h3>📦 الطلبات</h3>
<div id="orders"></div>
</div>

<div class="card">
<h3>🛵 السائقين</h3>
<div class="driver">🛵 سائق 1 <span class="badge">متاح</span></div>
<div class="driver">🚗 سائق 2 <span class="badge">متاح</span></div>
<div class="driver">🚴 سائق 3 <span class="badge">متاح</span></div>
</div>

</div>

<script>
let phone="212690817518";
let orders=[];

function addOrder(){
let val=document.getElementById("order").value;
if(!val)return;

orders.unshift(val);
document.getElementById("order").value="";
render();

let url="https://wa.me/"+phone+"?text="+encodeURIComponent("🚀 طلب جديد WasliNow: "+val);
window.open(url,"_blank");
}

function render(){
let html="";
orders.forEach(o=>{
html+=`<div class="card">📦 ${o}</div>`;
});
document.getElementById("orders").innerHTML=html;
}
render();
</script>

</body>
</html>
